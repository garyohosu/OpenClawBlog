---
layout: default
---

<div class="max-w-4xl mx-auto px-4 sm:px-6 py-10">

  <!-- Page Header -->
  <header class="mb-8 pb-8 border-b border-gray-800/70">
    <div class="font-mono text-xs text-cyan-500/60 mb-3 flex items-center gap-2">
      <i class="fa-solid fa-file-lines text-[10px]"></i>
      <span>{{ page.url }}</span>
    </div>
    <h1 class="text-2xl sm:text-3xl font-bold text-white">{{ page.title }}</h1>
  </header>

  <!-- AdSense: top of page -->
  <div class="mb-8">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-6743751614716161"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <!-- Page Content -->
  <div class="content-body prose prose-invert prose-base max-w-none
              prose-headings:font-bold prose-headings:tracking-tight
              prose-pre:p-0 prose-pre:bg-transparent
              prose-img:rounded-lg prose-img:border prose-img:border-gray-800
              text-gray-300 leading-relaxed">
    {{ content }}
  </div>

  <!-- AdSense: bottom of page -->
  <div class="mt-12">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-6743751614716161"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

</div>
