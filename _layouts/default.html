<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ja' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | strip_newlines | truncate: 160 }}">

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6743751614716161"
       crossorigin="anonymous"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <!-- Tailwind CSS (Play CDN with Typography plugin) -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>

  <!-- Highlight.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/rust.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/toml.min.js"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
          colors: {
            accent: '#22d3ee',
            'accent-dim': '#0891b2',
            'gray-950': '#030712',
          },
          typography: {
            DEFAULT: {
              css: {
                '--tw-prose-body': '#d1d5db',
                '--tw-prose-headings': '#f9fafb',
                '--tw-prose-lead': '#9ca3af',
                '--tw-prose-links': '#22d3ee',
                '--tw-prose-bold': '#f9fafb',
                '--tw-prose-counters': '#9ca3af',
                '--tw-prose-bullets': '#6b7280',
                '--tw-prose-hr': '#374151',
                '--tw-prose-quotes': '#9ca3af',
                '--tw-prose-quote-borders': '#22d3ee',
                '--tw-prose-captions': '#9ca3af',
                '--tw-prose-code': '#22d3ee',
                '--tw-prose-pre-code': '#d1d5db',
                '--tw-prose-pre-bg': '#111827',
                '--tw-prose-th-borders': '#4b5563',
                '--tw-prose-td-borders': '#374151',
              },
            },
          },
        },
      },
    }
  </script>

  <style>
    body { background-color: #030712; }
    /* Inline code styling */
    .content-body :not(pre) > code {
      background: #1f2937;
      color: #22d3ee;
      padding: 0.15em 0.45em;
      border-radius: 0.3rem;
      font-size: 0.875em;
      font-family: 'JetBrains Mono', monospace;
      border: 1px solid #374151;
    }
    /* Table styling */
    .content-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9em;
    }
    .content-body th {
      background: #111827;
      color: #f9fafb;
      padding: 0.6rem 1rem;
      border: 1px solid #374151;
      text-align: left;
    }
    .content-body td {
      padding: 0.6rem 1rem;
      border: 1px solid #374151;
      color: #d1d5db;
    }
    .content-body tr:hover td { background: #111827; }
    /* Blockquote */
    .content-body blockquote {
      border-left: 3px solid #22d3ee;
      padding-left: 1rem;
      color: #9ca3af;
      font-style: italic;
    }
    /* Heading anchor */
    .content-body h2 {
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #1f2937;
    }
    /* Link */
    .content-body a { color: #22d3ee; text-decoration: underline; text-underline-offset: 3px; }
    .content-body a:hover { color: #67e8f9; }
    /* hljs rounding */
    .hljs { border-radius: 0.5rem; font-size: 0.875rem; line-height: 1.6; }
    pre code.hljs { padding: 1.25rem; }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #111827; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    /* Terminal cursor blink */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor { animation: blink 1s step-end infinite; }
    /* Glow effect */
    .text-glow { text-shadow: 0 0 20px rgba(34,211,238,0.5); }
    /* Card hover */
    .post-card { transition: border-color 0.2s, background-color 0.2s, transform 0.2s; }
    .post-card:hover { transform: translateY(-2px); }
  </style>

  {% seo %}
</head>
<body class="text-gray-100 min-h-screen flex flex-col font-sans">

  <!-- Navigation Header -->
  <header class="border-b border-gray-800/70 sticky top-0 z-50 bg-gray-950/90 backdrop-blur-md">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
      <a href="{{ site.baseurl }}/" class="flex items-center gap-2 group select-none">
        <div class="w-8 h-8 rounded bg-cyan-500/10 border border-cyan-500/30 flex items-center justify-center">
          <span class="font-mono text-cyan-400 text-sm font-bold">&gt;_</span>
        </div>
        <span class="font-bold text-base text-white group-hover:text-cyan-400 transition-colors tracking-tight">{{ site.title }}</span>
      </a>
      <nav class="flex items-center gap-1">
        <a href="{{ site.baseurl }}/" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800 transition-all">
          <i class="fa-solid fa-house mr-1.5 text-xs"></i>Home
        </a>
        <a href="{{ site.baseurl }}/about/" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800 transition-all">
          <i class="fa-solid fa-circle-info mr-1.5 text-xs"></i>About
        </a>
        <a href="https://github.com/zeroclaw-labs/zeroclaw" target="_blank" rel="noopener"
           class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800 transition-all">
          <i class="fa-brands fa-github mr-1.5 text-xs"></i>GitHub
        </a>
      </nav>
    </div>
  </header>

  <!-- AdSense: Top Banner -->
  <div class="max-w-5xl mx-auto w-full px-4 sm:px-6 pt-3">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-6743751614716161"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <!-- Main Content -->
  <main class="flex-1">
    {{ content }}
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-800/70 mt-20">
    <!-- AdSense: Footer Banner -->
    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-4">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-6743751614716161"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-8">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-4 text-sm text-gray-500">
        <div class="flex items-center gap-2 font-mono">
          <span class="text-cyan-500/60">&gt;_</span>
          <span>{{ site.title }}</span>
          <span class="text-gray-700">|</span>
          <span>&copy; {{ site.time | date: '%Y' }} {{ site.author.name }}</span>
        </div>
        <div class="flex items-center gap-4">
          <a href="{{ site.baseurl }}/feed.xml" class="hover:text-cyan-400 transition-colors">
            <i class="fa-solid fa-rss text-xs mr-1"></i>RSS
          </a>
          <a href="{{ site.baseurl }}/sitemap.xml" class="hover:text-cyan-400 transition-colors">Sitemap</a>
          <span class="text-gray-700 text-xs">Built with Jekyll</span>
        </div>
      </div>
    </div>
  </footer>

  <!-- Highlight.js init -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
    });
  </script>

</body>
</html>
